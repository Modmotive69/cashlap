version: 2
updates:
  # npm dependencies — weekly PRs for security patches
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/New_York"
    # Group minor + patch updates together (fewer PRs)
    groups:
      minor-and-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]
    # Always open individual PRs for major version bumps
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
    commit-message:
      prefix: "deps"
    ignore:
      # jspdf: breaking upgrade needed separately (clears 2 remaining vulns)
      - dependency-name: "jspdf"
        update-types: ["version-update:semver-major"]

  # GitHub Actions — keep workflows up to date
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    labels:
      - "dependencies"
      - "github-actions"
